<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Widget Test</title>
  </head>
  <body style="padding: 2rem; font-family: sans-serif; background: #f5f5f5;">
    <h2>Prefilter (3 questions)</h2>
    <div
      class="asd-cta-widget"
      data-cta-type="prefilter"
      data-redirect-url="http://localhost:3000/listings"
    ></div>

    <hr style="margin: 2rem 0;" />

    <h2>Single dropdown</h2>
    <div
      class="asd-cta-widget"
      data-cta-type="single-dropdown"
      data-question-key="subjectArea"
      data-redirect-url="http://localhost:3000/listings"
    ></div>

    <hr style="margin: 2rem 0;" />

    <h2>Button only</h2>
    <div
      class="asd-cta-widget"
      data-cta-type="button"
      data-button-label="FIND SCHOOLS"
      data-redirect-url="http://localhost:3000/listings"
    ></div>

    <script src="./dist/widget.js"></script>
  </body>
</html>
